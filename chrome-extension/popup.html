<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      margin: 0;
      background: radial-gradient(circle at top, #2e0000 0%, #050505 80%);
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      box-sizing: border-box;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #330000;
    }
    h1 {
      font-size: 26px;
      color: #ff3333;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
      margin: 0;
      letter-spacing: 2px;
      font-weight: 800;
      transition: all 0.3s ease;
    }
    .subtext {
      color: #ff8888;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 5px;
      margin-bottom: 25px;
    }
    #imageContainer {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 10px auto 30px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #blastBtn {
      background: url('assets/icon.png') center/contain no-repeat;
      width: 180px;
      height: 180px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      outline: none;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2), inset 0 0 10px rgba(0,0,0,0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #blastBtn:hover {
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.6), inset 0 0 20px rgba(0,0,0,0.5);
      transform: scale(1.05);
    }
    #blastBtn:active {
      transform: scale(0.95);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
    }
    #stopBtn {
      background: transparent;
      color: #ff3333;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 30px;
      border: 2px solid #ff3333;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.3), inset 0 0 10px rgba(255, 0, 0, 0.1);
      transition: all 0.2s ease;
      width: 70%;
      margin: 10px auto;
      display: none;
    }
    #stopBtn:hover {
      background: rgba(255, 51, 51, 0.1);
      box-shadow: 0 0 25px rgba(255, 51, 51, 0.6), inset 0 0 15px rgba(255, 51, 51, 0.3);
      color: #ff6666;
    }
    #stopBtn:active {
      transform: scale(0.95);
    }
    .info {
      font-size: 11px;
      background: rgba(255, 0, 0, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      word-break: break-all;
      width: 90%;
      color: #bbbbbb;
      margin-top: auto;
    }
    .info strong {
      color: #ff5555;
    }
    #status {
      color: #ff5555;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 15px;
      min-height: 20px;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }
    /* Blasting mode animations */
    body.blasting {
      background: radial-gradient(circle at top, #4a0000 0%, #050505 80%);
    }
    body.blasting h1 {
      animation: pulseText 0.5s infinite alternate;
    }
    body.blasting #blastBtn {
      animation: pulseGlow 0.5s infinite alternate;
      pointer-events: none;
    }
    @keyframes pulseText {
      from { text-shadow: 0 0 10px rgba(255, 0, 0, 0.7); }
      to { text-shadow: 0 0 30px rgba(255, 0, 0, 1); color: #fff; }
    }
    @keyframes pulseGlow {
      from { box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); transform: scale(1); filter: brightness(1); }
      to { box-shadow: 0 0 60px rgba(255, 0, 0, 1); transform: scale(1.05); filter: brightness(1.3); }
    }
  </style>
</head>
<body>
  <div>
    <h1>Event Blaster</h1>
    <div class="subtext">System Override Protocol</div>
  </div>
  
  <div id="imageContainer">
    <button id="blastBtn" title="INITIATE OVERRIDE"></button>
  </div>
  
  <button id="stopBtn">ABORT OPERATION</button>
  
  <div class="info">
    <div><strong>TARGET:</strong> <span id="urlDisplay">Connecting...</span></div>
  </div>
  
  <div id="status">System Ready To Execute</div>
  
  <script src="popup.js"></script>
</body>
</html>
